# Nginx Configuration untuk Sidora V3 Production
# Copy to: /etc/nginx/sites-available/sidora-v3
# atau edit /etc/nginx/nginx.conf (server block section)

server {
    listen 80;
    server_name sidorav3.cloud;  # Change to your domain

    # CRITICAL: Allow large file uploads
    client_max_body_size 100M;
    client_body_timeout 300s;
    
    # Timeouts for long-running uploads
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 300s;
    
    # Logging
    access_log /var/log/nginx/sidora-v3-access.log;
    error_log /var/log/nginx/sidora-v3-error.log warn;

    # ===== SERVE STATIC UPLOADS DIRECTLY =====
    # This prevents going through Next.js for static files
    location /uploads/ {
        # Set to path where Docker/PM2 saves files
        alias /var/www/sidora-v3/public/uploads/;
        
        # Caching for static files
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        
        # Log requests
        access_log /var/log/nginx/sidora-v3-uploads.log;
    }

    # ===== PROXY TO NEXT.JS APP =====
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Caching
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffering - IMPORTANT for uploads
        # Don't buffer entire request in memory
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # ===== STATIC NEXT.JS ASSETS =====
    location /_next/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        proxy_pass http://localhost:3000;
        access_log off;
    }

    # ===== GZIP COMPRESSION =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;
}

