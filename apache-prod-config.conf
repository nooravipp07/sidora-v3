# Apache Configuration untuk SIDORA V3 Production
# Copy ke: /etc/apache2/sites-available/sidora-v3.conf
# Next.js dijalankan via PM2 di port 3000

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName sidora.bandungkab.go.id
    ServerAlias www.sidora.bandungkab.go.id

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/sidora-error.log
    CustomLog ${APACHE_LOG_DIR}/sidora-access.log combined

    # ===== CRITICAL: Allow large file uploads =====
    LimitRequestBody 104857600
    TimeOut 300

    # ===== Enable Proxy Modules =====
    <IfModule mod_proxy.c>
        ProxyPreserveHost On
        ProxyRequests Off

        # Proxy semua request ke Next.js (PM2 port 3000)
        ProxyPass / http://127.0.0.1:3000/
        ProxyPassReverse / http://127.0.0.1:3000/

        # WebSocket support
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{HTTP:Upgrade} websocket [NC]
            RewriteCond %{HTTP:Connection} upgrade [NC]
            RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]
        </IfModule>
    </IfModule>

    # ===== Headers untuk Next.js =====
    <IfModule mod_headers.c>
        RequestHeader set X-Forwarded-Proto "http"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}e"
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}e"
        RequestHeader set X-Forwarded-For "%{HTTP_CF_CONNECTING_IP}e"

        # Security headers
        Header set X-Content-Type-Options "nosniff"
        Header set X-Frame-Options "SAMEORIGIN"
        Header set X-XSS-Protection "1; mode=block"
        Header set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

    # ===== GZIP Compression =====
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/xml+rss application/json
    </IfModule>

    # Redirect ke HTTPS (uncomment jika sudah ada SSL)
    # Redirect permanent / https://sidora.bandungkab.go.id/
</VirtualHost>

